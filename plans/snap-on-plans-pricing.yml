description: Snap-on is a tools, equipment, and diagnostics manufacturer with a franchise distribution
  model. The corporate site does not publish a developer API, partner API portal, or programmatic
  pricing surface; integration-adjacent offerings are limited to the franchise opportunity and a
  product-submission portal.
sources:
  - https://www.snapon.com
notes: |
  Snap-on is not a software / API vendor. No public developer plan catalog exists. Diagnostic
  software products (e.g. SureTrack, SOLUS) ship with the physical hardware and are not metered
  against an API plan.
plans:
  - id: snap-on-contact-sales
    name: Contact Sales
    type: enterprise
    description: Snap-on does not publish API plans. Any data integration with Snap-on diagnostic
      products or business systems is handled bilaterally via Snap-on Business Solutions or the
      relevant product team.
    entries:
      - label: Custom Negotiated Pricing
        name: custom_pricing
        type: flat
        metric: varies
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: 'contact sales'
        userMultiplied: false
    elements:
      - name: Snap-on Business Solutions
      - name: Diagnostics Software (Bundled with Hardware)
      - name: Franchise Operations
