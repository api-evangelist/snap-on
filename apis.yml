apis:
  - aid: snap-on:snap-on-epc
    name: Snap-on Electronic Parts Catalog (EPC)
    description: >-
      The Snap-on Electronic Parts Catalog (EPC) provides dealer management
      system (DMS) integration for parts lookup, pricing, and ordering. The EPC
      integration supports file-writer, Launch EPC, and advanced DMS integrations
      with providers including CDK, Dealertrack, Tekion, Dealer-FX, and EVOPOS.
      OEMs supported include Ford, FCA (Chrysler, Jeep, Dodge, Ram), KIA, and
      many others across 125,000 dealerships in 130+ countries.
    humanURL: https://sbs.snapon.com/automotive/epc/epc5/
    tags:
      - Automotive
      - Dealer Management
      - Electronic Parts Catalog
      - Parts Ordering
    properties:
      - type: Documentation
        url: https://sbs.snapon.com/automotive/epc/epc5/
      - type: Documentation
        url: https://docs.snaponbusinesssolutions.com/docs/EPC5Help/Ford/EPC5_Help_en-US/Content/ConfiguringIntegration.htm
  - aid: snap-on:snap-on-shopkey-pro
    name: ShopKey Pro Repair Information System
    description: >-
      ShopKey Pro is Snap-on's comprehensive automotive repair information system
      providing access to OEM repair data, wiring diagrams, technical service
      bulletins (TSBs), maintenance schedules, diagnostic procedures, and
      SureTrack expert real-fix information for over 50 vehicle makes. Accessible
      via web subscription and directly from Snap-on diagnostic tools with Wi-Fi.
    humanURL: https://www.shopkeypro.com/
    tags:
      - Automotive
      - Repair Information
      - Diagnostics
      - OEM Data
    properties:
      - type: Documentation
        url: https://www.snapon.com/EN/US/Diagnostics/ShopKey-Pro
      - type: Website
        url: https://www.shopkeypro.com/
  - aid: snap-on:snap-on-suretrack
    name: SureTrack Expert Information
    description: >-
      SureTrack is Snap-on's cloud-based expert knowledge platform for automotive
      technicians, providing diagnostic experience, repair timesavers, verified
      parts replacement records, and Real Fixes harvested from millions of
      successful repair orders. Integrated into Snap-on diagnostic testers and
      accessible via Wi-Fi.
    humanURL: https://www.snapon.com/EN/US/Diagnostics/Information--Software-Products/SureTrack-Expert
    tags:
      - Automotive
      - Cloud Platform
      - Diagnostics
      - Expert Information
    properties:
      - type: Documentation
        url: https://www.snapon.com/EN/US/Diagnostics/Information--Software-Products/SureTrack-Expert
  - aid: snap-on:snap-on-diagnostics
    name: Snap-on Diagnostics Software
    description: >-
      Snap-on provides professional diagnostic software for automotive technicians
      covering 50+ domestic, Asian, and European vehicle makes back to 1983.
      Software includes code scan and clear, functional tests, component tests,
      system-specific diagnostics, and OEM gateway access. Updated twice yearly
      with expanded vehicle coverage.
    humanURL: https://www.snapon.com/EN/US/Diagnostics/Information--Software-Products/Diagnostic-Tool-Software
    tags:
      - Automotive
      - Diagnostics
      - OEM Integration
      - Software
    properties:
      - type: Documentation
        url: https://www.snapon.com/EN/US/Diagnostics/Information--Software-Products/Diagnostic-Tool-Software
