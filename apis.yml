name: Snap-on
description: >-
  Snap-on Incorporated is a global manufacturer and marketer of tools,
  equipment, diagnostics, repair information, and systems solutions for
  professional users in vehicle repair, industrial, and other industries.
  The company provides diagnostic tools, electronic parts catalogs (EPC),
  repair information systems (ShopKey Pro, SureTrack), and shop management
  software. Snap-on integrates with dealer management systems (DMS) through
  its EPC integration program and strategic technology partnerships.
